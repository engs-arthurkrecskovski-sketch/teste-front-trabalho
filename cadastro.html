<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Cliente - AutoManage</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <nav class="sidebar">
        <h2>🔧 OFICINA<span>PRO</span></h2>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="cadastro.html" class="active">Clientes</a></li>
            <li><a href="agendamento.html">Agendamento</a></li>
            <li><a href="historico.html">Histórico</a></li>
        </ul>
    </nav>

    <main>
        <div class="form-container">
            <h1>Cadastrar Cliente</h1>
            <form id="form-cliente" class="box-cadastro">
                <div class="form-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label>Veículo e Placa</label>
                    <input type="text" id="carro" required>
                </div>
                <button type="submit" class="btn-salvar">Salvar Cadastro</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('form-cliente').onsubmit = (e) => {
            e.preventDefault();
            const clientes = getClientes();
            clientes.push({ 
                id: Date.now(), 
                nome: document.getElementById('nome').value, 
                carro: document.getElementById('carro').value 
            });
            salvarDados('oficina_clientes', clientes);
            alert('Cliente cadastrado com sucesso!');
            e.target.reset();
        };
    </script>
</body>
</html>
